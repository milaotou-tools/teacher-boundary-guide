name: Update .env and restart

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ALIYUN_SSH_KEY }}

      - name: Trust server host key
        env:
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          SSH_PORT="${ALIYUN_PORT:-22}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" -H "${{ secrets.ALIYUN_HOST }}" >> ~/.ssh/known_hosts

      - name: Update .env
        env:
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          APP_ENCRYPTION_KEY: ${{ secrets.APP_ENCRYPTION_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          SSH_PORT="${ALIYUN_PORT:-22}"
          ssh -p "$SSH_PORT" "${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}" 'cat > /www/wwwroot/teacher-boundary-guide/.env' <<STDENV
          PORT=4173
          HOST=127.0.0.1
          NODE_ENV=production
          DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
          DEEPSEEK_MODEL=deepseek-v4-flash
          APP_ENCRYPTION_KEY=${APP_ENCRYPTION_KEY}
          ADMIN_PASSWORD=${ADMIN_PASSWORD}
          TRUST_PROXY=true
          COOKIE_SECURE=false
          STDENV
          ssh -p "$SSH_PORT" "${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}" '
          pm2 restart teacher-boundary-guide --update-env
          pm2 save
          echo "Restarted OK"
          curl -s -o /dev/null -w "Health check: HTTP %{http_code}\n" http://127.0.0.1:4173/
          '
