name: Setup Public Port (one-time)

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ALIYUN_SSH_KEY }}

      - name: Trust server host key
        env:
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          SSH_PORT="${ALIYUN_PORT:-22}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" -H "${{ secrets.ALIYUN_HOST }}" >> ~/.ssh/known_hosts

      - name: Configure Nginx and firewall
        env:
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          SSH_PORT="${ALIYUN_PORT:-22}"
          ssh -p "$SSH_PORT" "${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}" '
          set -e

          # Remove old manual config
          rm -f /www/server/panel/vhost/nginx/teacher-boundary-guide.conf

          # Create BT Panel standard config (matching 0.0.0.0_8084.conf pattern)
          cat <<NGINXEOF > /www/server/panel/vhost/nginx/0.0.0.0_8086.conf
          server
          {
              listen 8086;
              server_name 0.0.0.0_8086;
              root /www/wwwroot/teacher-boundary-guide;

              location / {
                  proxy_pass http://127.0.0.1:4173;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
              }

              access_log /www/wwwlogs/0.0.0.0_8086.log;
              error_log /www/wwwlogs/0.0.0.0_8086.error.log;
          }
          NGINXEOF

          echo "Nginx config written"

          # Ensure SELinux allows network connect
          setsebool -P httpd_can_network_connect 1 2>/dev/null || true

          # Test and reload Nginx
          nginx -t
          nginx -s reload
          echo "Nginx reloaded OK"

          # Open firewall ports
          firewall-cmd --add-port=8086/tcp --permanent 2>/dev/null || true
          firewall-cmd --reload 2>/dev/null || true
          iptables -I INPUT -p tcp --dport 8086 -j ACCEPT 2>/dev/null || true

          echo "=== Verify ==="
          ss -tlnp | grep 8086
          curl -s -o /dev/null -w "Internal 127.0.0.1:8086 HTTP %{http_code}\n" http://127.0.0.1:8086/
          curl -s -o /dev/null -w "Internal localhost:8086 HTTP %{http_code}\n" http://localhost:8086/
          echo "Setup done"
          '
