name: Debug Nginx 502

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ALIYUN_SSH_KEY }}

      - name: Trust server host key
        env:
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          SSH_PORT="${ALIYUN_PORT:-22}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" -H "${{ secrets.ALIYUN_HOST }}" >> ~/.ssh/known_hosts

      - name: Diagnose Nginx
        env:
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          SSH_PORT="${ALIYUN_PORT:-22}"
          ssh -p "$SSH_PORT" "${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}" '
          echo "=== Nginx config includes ==="
          grep -r "include" /www/server/nginx/conf/nginx.conf 2>/dev/null | head -10

          echo ""
          echo "=== Our config file ==="
          cat /www/server/panel/vhost/nginx/teacher-boundary-guide.conf 2>/dev/null || echo "file not found"

          echo ""
          echo "=== All vhost configs ==="
          ls -la /www/server/panel/vhost/nginx/ 2>/dev/null

          echo ""
          echo "=== Nginx access log for 8086 ==="
          tail -20 /www/wwwlogs/0.0.0.0_8086.log 2>/dev/null || echo "no access log yet"

          echo ""
          echo "=== Nginx error log for 8086 ==="
          tail -10 /www/wwwlogs/0.0.0.0_8086.error.log 2>/dev/null || echo "no error log"

          echo ""
          echo "=== Firewall status ==="
          iptables -L INPUT -n --line-numbers 2>/dev/null | grep 8086 || echo "no iptables rule for 8086"
          firewall-cmd --list-ports 2>/dev/null || echo "firewalld not running"

          echo ""
          echo "=== Test with explicit Host ==="
          curl -s -o /dev/null -w "HTTP %{http_code}\n" -H "Host: 116.62.220.255:8086" http://127.0.0.1:8086/

          echo ""
          echo "=== Test localhost ==="
          curl -s -o /dev/null -w "HTTP %{http_code}\n" http://localhost:8086/
          echo ""
          echo "Debug done"
          '

      - name: Test from external (GitHub Actions runner)
        run: |
          echo "=== Testing from GitHub Actions runner (external) ==="
          curl -s -o /dev/null -w "Direct 8086: HTTP %{http_code}\n" --connect-timeout 10 "http://116.62.220.255:8086/" || echo "8086 test failed"
          curl -s -o /dev/null -w "Direct 8083: HTTP %{http_code}\n" --connect-timeout 10 "http://116.62.220.255:8083/" || echo "8083 test failed"
