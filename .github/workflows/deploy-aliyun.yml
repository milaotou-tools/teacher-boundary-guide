name: Deploy to Aliyun

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-aliyun-teacher-boundary
  cancel-in-progress: true

env:
  APP_NAME: teacher-boundary-guide
  REPO_URL: https://github.com/milaotou-tools/teacher-boundary-guide.git
  BRANCH: main
  DEPLOY_PATH: /www/wwwroot/teacher-boundary-guide
  PM2_NAME: teacher-boundary-guide
  APP_PORT: "4173"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ALIYUN_SSH_KEY }}

      - name: Trust server host key
        env:
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          SSH_PORT="${ALIYUN_PORT:-22}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" -H "${{ secrets.ALIYUN_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on Aliyun
        env:
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          SSH_PORT="${ALIYUN_PORT:-22}"
          ssh -p "$SSH_PORT" "${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}" "APP_NAME='${APP_NAME}' REPO_URL='${REPO_URL}' BRANCH='${BRANCH}' DEPLOY_PATH='${DEPLOY_PATH}' PM2_NAME='${PM2_NAME}' APP_PORT='${APP_PORT}' GITHUB_TOKEN='${GITHUB_TOKEN}' bash -s" <<'EOF'
          set -euo pipefail

          mkdir -p "$DEPLOY_PATH"
          cd "$DEPLOY_PATH"
          git config --global --add safe.directory "$DEPLOY_PATH" >/dev/null 2>&1 || true
          if [ -n "${GITHUB_TOKEN:-}" ]; then
            git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
          fi

          if [ ! -d ".git" ]; then
            if [ -n "$(ls -A . 2>/dev/null)" ]; then
              echo "[deploy] first deploy path is not empty: $DEPLOY_PATH"
              exit 1
            fi
            echo "[deploy] first deploy: cloning repository"
            git clone -b "$BRANCH" "$REPO_URL" .
          fi

          chmod +x deploy.sh
          ./deploy.sh
          EOF

      - name: Set up .env from secrets
        env:
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          SSH_PORT="${ALIYUN_PORT:-22}"
          ssh -p "$SSH_PORT" "${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}" '
          cat <<ENVEOF > /www/wwwroot/teacher-boundary-guide/.env
          PORT=4173
          HOST=127.0.0.1
          NODE_ENV=production
          DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL=deepseek-v4-flash
          APP_ENCRYPTION_KEY=${{ secrets.APP_ENCRYPTION_KEY }}
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          TRUST_PROXY=true
          ENVEOF
          pm2 restart teacher-boundary-guide --update-env
          pm2 save
          '
